<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – King Trading Co.</title>
  <meta name="theme-color" content="#1a5c38">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #0f3d25 0%, #1a5c38 100%); }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="ll-icon">🌾</div>
      <h1>King Trading Co.</h1>
      <p>Admin Portal — Sign in to manage products</p>
    </div>

    <div class="alert error" id="loginError"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="admin@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="submit-btn" id="loginBtn">
      <span id="loginBtnText">Sign In</span>
    </button>

    <p style="text-align:center;margin-top:20px;font-size:0.78rem;color:var(--text-muted)">
      Forgot password? Contact your Firebase project owner.
    </p>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
// Redirect if already logged in
auth.onAuthStateChanged(user => {
  if (user) window.location.href = "admin.html";
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email    = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errEl    = document.getElementById("loginError");
  const btn      = document.getElementById("loginBtn");
  const btnText  = document.getElementById("loginBtnText");

  errEl.classList.remove("show");
  if (!email || !password) {
    errEl.textContent = "Please enter email and password.";
    errEl.classList.add("show");
    return;
  }

  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner" style="border-color:rgba(255,255,255,0.35);border-top-color:#fff;display:inline-block"></div>';

  try {
    await auth.signInWithEmailAndPassword(email, password);
    window.location.href = "admin.html";
  } catch(err) {
    let msg = "Login failed. Check your credentials.";
    if (err.code === "auth/user-not-found")  msg = "No account found with this email.";
    if (err.code === "auth/wrong-password")  msg = "Incorrect password.";
    if (err.code === "auth/invalid-email")   msg = "Invalid email address.";
    if (err.code === "auth/too-many-requests") msg = "Too many attempts. Try again later.";
    errEl.textContent = msg;
    errEl.classList.add("show");
    btn.disabled = false;
    btnText.textContent = "Sign In";
  }
});

// Allow Enter key
document.getElementById("loginPassword").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
});
</script>
</body>
</html>
