<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>King Trading Co. – Quality Groceries & Rice</title>
  <meta name="description" content="King Trading Co. – Premium rice, dal, flour, oil and groceries wholesale and retail.">
  <meta name="theme-color" content="#1a5c38">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="./king-trading/css/style.css">
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <nav class="nav">
    <a href="index.html" class="logo">
      <div class="logo-icon">🌾</div>
      <div class="logo-text">King Trading Co.
        <span>Quality Groceries</span>
      </div>
    </a>

    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="Search rice, dal, flour…" autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>

    <div class="nav-actions">
      <a href="./king-trading/cart.html" class="cart-btn" aria-label="Cart">
        🛒
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </nav>
</header>

<!-- ── Hero ── -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-badge">Since 1990 · Trusted Quality</div>
    <h1>Fresh Groceries<br>Direct to You</h1>
    <p>Rice • Dal • Flour • Oil • Masala & more</p>
  </div>
</section>

<!-- ── Category Filters ── -->
<div class="filters-wrap">
  <div class="filters">
    <button class="filter-btn active" data-cat="All"><span class="cat-emoji">🏪</span> All</button>
    <button class="filter-btn" data-cat="Rice"><span class="cat-emoji">🌾</span> Rice</button>
    <button class="filter-btn" data-cat="Dal"><span class="cat-emoji">🫘</span> Dal</button>
    <button class="filter-btn" data-cat="Flour"><span class="cat-emoji">🌻</span> Flour</button>
    <button class="filter-btn" data-cat="Oil"><span class="cat-emoji">🫙</span> Oil</button>
    <button class="filter-btn" data-cat="Masala"><span class="cat-emoji">🌶️</span> Masala</button>
    <button class="filter-btn" data-cat="Other"><span class="cat-emoji">🛒</span> Other</button>
  </div>
</div>

<!-- ── Products ── -->
<main class="main">
  <div class="section-header">
    <h2 class="section-title">Our Products</h2>
    <span class="product-count" id="productCount">Loading…</span>
  </div>
  <div class="products-grid" id="productsGrid">
    <!-- Cards injected by app.js -->
  </div>
</main>

<!-- Mobile search bar (shown on small screens) -->
<div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:10px 16px;display:none" id="mobileSearchBar">
  <input type="text" id="mobileSearch" placeholder="Search products…"
    style="width:100%;height:40px;border:1.5px solid var(--border);border-radius:99px;padding:0 16px;font-size:0.875rem;outline:none;">
</div>

<!-- ── Footer ── -->
<footer class="footer">
  <p>© 2024 King Trading Co. · 📞 90803 48568 · Chennai, Tamil Nadu</p>
</footer>

<!-- ── WhatsApp Floating Button ── -->
<a class="wa-btn" href="https://wa.me/919080348568?text=Vanakkam%20king%20trading%20co,%20I%20would%20like%20to%20place%20an%20order."
   target="_blank" rel="noopener" aria-label="Order on WhatsApp">
  <span class="wa-tooltip">Order on WhatsApp</span>
  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 1C7.729 1 1 7.729 1 16c0 2.68.697 5.197 1.916 7.381L1 31l7.86-1.873A14.948 14.948 0 0016 31c8.271 0 15-6.729 15-15S24.271 1 16 1zm0 27.5a12.447 12.447 0 01-6.32-1.723l-.453-.27-4.664 1.112 1.16-4.537-.296-.465A12.444 12.444 0 013.5 16C3.5 9.096 9.096 3.5 16 3.5S28.5 9.096 28.5 16 22.904 28.5 16 28.5zm6.84-9.296c-.374-.188-2.215-1.092-2.558-1.216-.343-.125-.593-.187-.843.188-.25.374-.968 1.216-1.187 1.467-.218.25-.437.28-.812.093-.374-.188-1.58-.582-3.009-1.856-1.112-.993-1.862-2.218-2.08-2.593-.218-.374-.023-.576.165-.762.17-.169.374-.438.562-.656.188-.218.25-.374.375-.624.124-.25.062-.469-.031-.657-.094-.188-.844-2.032-1.156-2.782-.305-.729-.615-.63-.843-.642-.218-.012-.468-.015-.718-.015-.25 0-.656.094-.999.469-.343.374-1.312 1.282-1.312 3.126s1.343 3.625 1.53 3.875c.188.25 2.645 4.04 6.407 5.665.896.387 1.596.617 2.14.789.899.285 1.717.245 2.363.148.72-.107 2.215-.905 2.527-1.78.312-.874.312-1.624.218-1.78-.093-.156-.343-.25-.718-.437z"/>
  </svg>
</a>

<!-- ── Firebase SDKs (v8 compat) ── -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- App Scripts -->
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>

<!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('SW registered'))
      .catch(err => console.warn('SW failed:', err));
  }
  // Show mobile search on small screens
  if (window.innerWidth < 480) {
    document.getElementById('mobileSearchBar').style.display = 'block';
    document.getElementById('mobileSearch').addEventListener('input', e => {
      document.getElementById('searchInput').value = e.target.value;
      document.getElementById('searchInput').dispatchEvent(new Event('input'));
    });
  }
</script>
</body>
</html>
